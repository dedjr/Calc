name: SEO and Performance Audit
on: [push]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Audit URL with Lighthouse
        uses: treosh/lighthouse-ci-action@v9
        with:
          urls: |
            https://debatre.com/
          budgetPath: ./budget.json
          # Kita hapus opsi uploadArtifacts dan biarkan dia menggunakan temporary storage
          # Kita tambahkan config ini untuk mencegah konflik penamaan
          runs: 1
        env:
          # Menonaktifkan semua fitur yang mencoba menulis ke artifact container GitHub
          LHCI_NO_ARTIFACTS: true
