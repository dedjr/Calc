<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEBATRE - Pusat Edukasi & Kalkulator Baterai LiFePO4</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Font - Plus Jakarta Sans for optimal readability -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Apply Plus Jakarta Sans to the body */
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f7f9fc; /* Light, clean background */
        }
        /* Custom styles for the TikTok-style gradient text (explicitly defined for consistency) */
        .gradient-text-tiktok {
            background-image: linear-gradient(to right, #2563eb, #9333ea, #ec4899); /* blue-600, purple-600, pink-600 */
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        /* Gradient for DEBATRE title */
        .gradient-text-teal-indigo {
            background-image: linear-gradient(to right, #0d9488, #4f46e5); /* teal-600, indigo-700 */
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        /* Ensure input focus is highly visible */
        input:focus {
            outline: none;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.5); /* blue-500 with opacity */
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-start text-gray-800 antialiased">

    <!-- Header Section: Logo & Main Title -->
    <header class="w-full max-w-6xl mx-auto py-10 px-6 sm:px-8 text-center bg-white shadow-lg rounded-b-xl z-10 relative">
        <h1 class="text-6xl font-extrabold leading-tight tracking-tighter mb-2">
            <span class="gradient-text-teal-indigo">DEBATRE</span>
        </h1>
        <p class="text-xl md:text-2xl text-gray-600 font-medium">Pusat Edukasi & Kalkulator Baterai LiFePO4</p>
    </header>

    <!-- Main Content Area - Calculator Inputs -->
    <main class="w-full max-w-6xl mx-auto mt-10 px-6 sm:px-8 flex-grow">
        <section id="calculator" class="bg-white p-8 md:p-12 rounded-xl shadow-2xl border border-gray-100">
            <h2 class="text-3xl font-bold text-center mb-10 text-gray-900">Kalkulator Kapasitas & Energi</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <!-- Input Field: Daya Beban (Watt) -->
                <div class="flex flex-col">
                    <label for="watt" class="text-lg font-semibold mb-3 text-gray-700">Daya Beban (Watt)</label>
                    <input type="number" id="watt" value="300" class="text-4xl py-5 px-6 border-4 border-blue-700 rounded-lg shadow-inner text-gray-900 text-center font-bold">
                </div>
                <!-- Input Field: Durasi Pakai (Jam) -->
                <div class="flex flex-col">
                    <label for="hours" class="text-lg font-semibold mb-3 text-gray-700">Durasi Pakai (Jam)</label>
                    <input type="number" id="hours" value="5" class="text-4xl py-5 px-6 border-4 border-blue-700 rounded-lg shadow-inner text-gray-900 text-center font-bold">
                </div>
                <!-- Input Field: Tegangan (Volt) -->
                <div class="flex flex-col">
                    <label for="voltage" class="text-lg font-semibold mb-3 text-gray-700">Tegangan (Volt)</label>
                    <input type="number" id="voltage" value="12" class="text-4xl py-5 px-6 border-4 border-blue-700 rounded-lg shadow-inner text-gray-900 text-center font-bold">
                </div>
            </div>
            <div class="mt-10 text-center">
                <button id="calculateBtn" class="bg-gradient-to-r from-blue-600 to-purple-700 hover:from-blue-700 hover:to-purple-800 text-white font-bold py-5 px-12 rounded-xl text-2xl shadow-xl transition-all duration-300 transform hover:scale-105 focus:outline-none focus:ring-4 focus:ring-blue-300">
                    Hitung Sekarang!
                </button>
            </div>
        </section>

        <!-- Results Section -->
        <section id="results" class="mt-16 mb-20">
            <h2 class="text-3xl font-bold text-center mb-10 text-gray-900">Hasil Rekomendasi Sistem Anda</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <!-- Result Card: Kapasitas Baterai (Ah) -->
                <div class="bg-white p-8 rounded-xl shadow-2xl border border-gray-100 flex flex-col items-center justify-center text-center">
                    <!-- Battery SVG Icon (Inline, detailed) -->
                    <svg class="w-24 h-24 mb-6" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <linearGradient id="batteryGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:#22c55e" /> <!-- green-500 -->
                            <stop offset="100%" style="stop-color:#16a34a" /> <!-- green-600 -->
                        </linearGradient>
                        <rect x="5" y="4" width="14" height="16" rx="2" fill="url(#batteryGradient)" stroke="#15803d" stroke-width="1.5"/>
                        <!-- Terminal Plus -->
                        <rect x="15" y="2" width="2" height="2" rx="0.5" fill="#facc15" stroke="#eab308" stroke-width="1"/>
                        <!-- Terminal Minus -->
                        <rect x="7" y="2" width="2" height="2" rx="0.5" fill="#ef4444" stroke="#dc2626" stroke-width="1"/>
                        <!-- Cell lines (visual representation of LiFePO4 cells) -->
                        <line x1="7" y1="8" x2="17" y2="8" stroke="white" stroke-width="0.5"/>
                        <line x1="7" y1="12" x2="17" y2="12" stroke="white" stroke-width="0.5"/>
                        <line x1="7" y1="16" x2="17" y2="16" stroke="white" stroke-width="0.5"/>
                        <path d="M12 5V19" stroke="white" stroke-width="0.5" stroke-dasharray="2 2"/>
                    </svg>
                    <p class="text-xl font-medium text-gray-600 mb-2">Kapasitas Baterai (LiFePO4)</p>
                    <p id="resultAh" class="text-6xl font-black gradient-text-tiktok">0 Ah</p>
                </div>

                <!-- Result Card: Kapasitas Panel Surya (Wp) -->
                <div class="bg-white p-8 rounded-xl shadow-2xl border border-gray-100 flex flex-col items-center justify-center text-center">
                    <!-- Solar Panel SVG Icon (Inline, detailed) -->
                    <svg class="w-24 h-24 mb-6" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <linearGradient id="solarPanelGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:#60a5fa" /> <!-- blue-400 -->
                            <stop offset="100%" style="stop-color:#3b82f6" /> <!-- blue-500 -->
                        </linearGradient>
                        <rect x="3" y="6" width="18" height="14" rx="2" fill="url(#solarPanelGradient)" stroke="#2563eb" stroke-width="1.5"/>
                        <!-- Grid lines for cells -->
                        <line x1="6" y1="6" x2="6" y2="20" stroke="white" stroke-width="0.5"/>
                        <line x1="10" y1="6" x2="10" y2="20" stroke="white" stroke-width="0.5"/>
                        <line x1="14" y1="6" x2="14" y2="20" stroke="white" stroke-width="0.5"/>
                        <line x1="18" y1="6" x2="18" y2="20" stroke="white" stroke-width="0.5"/>
                        <line x1="3" y1="9.5" x2="21" y2="9.5" stroke="white" stroke-width="0.5"/>
                        <line x1="3" y1="13" x2="21" y2="13" stroke="white" stroke-width="0.5"/>
                        <line x1="3" y1="16.5" x2="21" y2="16.5" stroke="white" stroke-width="0.5"/>
                        <!-- Sun element -->
                        <circle cx="20" cy="4" r="2.5" fill="#fcd34d" stroke="#f59e0b" stroke-width="1"/>
                        <path d="M20 1V2.5M20 5.5V7M17 4H18.5M21.5 4H23M18.07 2.07L19.07 3.07M20.93 4.93L21.93 5.93" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                    <p class="text-xl font-medium text-gray-600 mb-2">Kapasitas Panel Surya (Minimal)</p>
                    <p id="resultWp" class="text-6xl font-black gradient-text-tiktok">0 Wp</p>
                </div>

                <!-- Result Card: Amperage SCC (MPPT) -->
                <div class="bg-white p-8 rounded-xl shadow-2xl border border-gray-100 flex flex-col items-center justify-center text-center">
                    <!-- MPPT Charge Controller SVG Icon (Inline, detailed) -->
                    <svg class="w-24 h-24 mb-6" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <linearGradient id="sccGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:#4b5563" /> <!-- gray-700 -->
                            <stop offset="100%" style="stop-color:#1f2937" /> <!-- gray-900 -->
                        </linearGradient>
                        <rect x="3" y="5" width="18" height="14" rx="2" fill="url(#sccGradient)" stroke="#111827" stroke-width="1.5"/>
                        <!-- LCD Display -->
                        <rect x="6" y="7" width="12" height="6" rx="1" fill="#e0e7ff" stroke="#4a5568" stroke-width="1"/>
                        <text x="12" y="10" font-family="monospace" font-size="3" fill="#4a5568" text-anchor="middle" alignment-baseline="middle">13.8V</text>
                        <text x="12" y="12" font-family="monospace" font-size="3" fill="#4a5568" text-anchor="middle" alignment-baseline="middle">30A</text>
                        <!-- Wire Ports -->
                        <rect x="4.5" y="16.5" width="3" height="2" rx="0.5" fill="#6b7280" stroke="#4a5568" stroke-width="0.5"/>
                        <rect x="10.5" y="16.5" width="3" height="2" rx="0.5" fill="#6b7280" stroke="#4a5568" stroke-width="0.5"/>
                        <rect x="16.5" y="16.5" width="3" height="2" rx="0.5" fill="#6b7280" stroke="#4a5568" stroke-width="0.5"/>
                        <!-- Labels for ports -->
                        <text x="6" y="16" font-family="Arial" font-size="1.5" fill="#e0e7ff" text-anchor="middle">PV</text>
                        <text x="12" y="16" font-family="Arial" font-size="1.5" fill="#e0e7ff" text-anchor="middle">BAT</text>
                        <text x="18" y="16" font-family="Arial" font-size="1.5" fill="#e0e7ff" text-anchor="middle">LOAD</text>
                    </svg>
                    <p class="text-xl font-medium text-gray-600 mb-2">Amperage SCC (MPPT)</p>
                    <p id="resultScc" class="text-6xl font-black gradient-text-tiktok">0 Ampere</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer Section -->
    <footer class="w-full max-w-6xl mx-auto mt-10 py-6 px-6 sm:px-8 text-center text-gray-500 text-sm border-t border-gray-200">
        &copy; 2023 DEBATRE. Semua Hak Cipta Dilindungi. Didesain untuk kemudahan Anda.
    </footer>

    <!-- JavaScript for Calculations -->
    <script>
        const wattInput = document.getElementById('watt');
        const hoursInput = document.getElementById('hours');
        const voltageInput = document.getElementById('voltage');
        const calculateButton = document.getElementById('calculateBtn');

        const resultAh = document.getElementById('resultAh');
        const resultWp = document.getElementById('resultWp');
        const resultScc = document.getElementById('resultScc');

        function calculate() {
            const watt = parseFloat(wattInput.value);
            const hours = parseFloat(hoursInput.value);
            const voltage = parseFloat(voltageInput.value);

            // Basic validation for inputs
            if (isNaN(watt) || isNaN(hours) || isNaN(voltage) || watt <= 0 || hours <= 0 || voltage <= 0) {
                const invalidText = 'Input Invalid';
                resultAh.textContent = invalidText;
                resultWp.textContent = invalidText;
                resultScc.textContent = invalidText;
                return;
            }

            // Calculations based on the provided formulas
            // Ah = Math.round(((Watt * Hours) / Voltage) * 1.2)
            const ah = Math.round(((watt * hours) / voltage) * 1.2);

            // Wp = Math.round(((Watt * Hours) / 4) * 1.2) - (4 is typically considered average sun hours for calculation)
            const wp = Math.round(((watt * hours) / 4) * 1.2);

            // SCC = Math.round(Total Wp / Voltage) - (Simple calculation for MPPT Amperage)
            const scc = Math.round(wp / voltage);

            // Update the display with calculated values
            resultAh.textContent = `${ah} Ah`;
            resultWp.textContent = `${wp} Wp`;
            resultScc.textContent = `${scc} Ampere`;
        }

        // Add event listeners to trigger calculation on button click and input changes
        calculateButton.addEventListener('click', calculate);
        wattInput.addEventListener('input', calculate);
        hoursInput.addEventListener('input', calculate);
        voltageInput.addEventListener('input', calculate);

        // Perform initial calculation when the page loads to display default values
        document.addEventListener('DOMContentLoaded', calculate);
    </script>
</body>
</html>
```
